<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>
    Game of Rock-Paper-Scissors
  </title>
  <style>
    body {
      background-color: rgb(40, 40, 40);
      font-family: Arial;
    }

    h1 {
      color: white;
    }

    p {
      color: white;
    }

    .move-icon {
      height: 50px;

    }

    .emoji {
      background-color: transparent;
      border: 3px, solid, white;
      width: 120px;
      height: 120px;
      padding: 17px;
      border-radius: 50%;
      margin-right: 14px;
      cursor: pointer;
    }

    .result {
      font-size: 25px;
      font-weight: bold;
      margin-top: 50px;
    }

    .score {
      margin-top: 60px;
    }

    .reset-score-button {
      background-color: white;
      border: none;
      font-size: 15px;
      padding: 10px 15px;
      border-radius: 5px;
    }
  </style>
</head>

<body>
  <h1>Rock Paper Scissors</h1>

  <button onclick="
      playgame('rock');
      " class="emoji"><img src="images/rock-emoji.png" class="move-icon"></button>
  <button onclick="
      playgame('paper');
      " class="emoji"><img src="images/paper-emoji.png" class="move-icon"></button>
  <button onclick="
     playgame('scissors');
          " class="emoji"><img src="images/scissors-emoji.png" class="move-icon">
  </button>
  <p class="js-result result">

  </p>
  <p class="js-moves">
    You <img src="images/rock-emoji.png" class="move-icon">
    <img src="images/rock-emoji.png" class="move-icon"> Computer
  </p>
  <p class="js-score score">
    Wins: 0, Losses: 0, Ties: 0
  </p>
  <button onclick="
    score.loses=0;
    score.wins=0;
    score.ties=0;
    localStorage.removeItem('score');
    updateScoreElement();
     " class="reset-score-button">Reset score
  </button>

  </div>

  <script>
    let score =
      JSON.parse(localStorage.getItem('score')) || {
        wins: 0,
        loses: 0,
        ties: 0
      };
    updateScoreElement();
    function playgame(playerMove) {
      const computermove = pickComputerMove();
      let result = '';
      if (playerMove === 'rock') {
        if (computermove === 'rock') {
          result = 'Tie.';
        }
        else if (computermove === 'paper') {
          result = 'You Lost.';
        }
        else if (computermove === 'scissors') {
          result = 'You Won.';
        }
      }
      else if (playerMove === 'scissors') {
        if (computermove === 'rock') {
          result = 'You Lost.';
        }
        else if (computermove == 'paper') {
          result = 'You Won.';
        }
        else if (computermove == 'scissors') {
          result = 'Tie.';
        }
      }
      else if (playerMove === 'paper') {
        if (computermove === 'rock') {
          result = 'You Won.';
        }
        else if (computermove == 'paper') {
          result = 'Tie.';
        }
        else if (computermove == 'scissors') {
          result = 'You Lost.';
        }
      }


      if (result === 'You Won.') {
        score.wins += 1;
      }
      else if (result === 'You Lost.') {
        score.loses += 1;
      }
      else if (result === 'Tie.') {
        score.ties += 1;
      }
      localStorage.setItem('score', JSON.stringify(score));
      updateScoreElement();
      document.querySelector('.js-result').innerHTML = result;
      document.querySelector('.js-moves').innerHTML = `You <img src="images/${playerMove}-emoji.png" class="move-icon">
    <img src="images/${computermove}-emoji.png" class="move-icon"> Computer`;

    }
    function updateScoreElement() {
      document.querySelector('.js-score').innerHTML = `Wins: ${score.wins}, Losses: ${score.loses}, Ties: ${score.ties}`;
    }

    function pickComputerMove() {
      const randomNumber = Math.random();
      let computermove = '';
      if (randomNumber >= 0 && randomNumber < 1 / 3) {
        computermove = 'rock';
      }
      else if (randomNumber >= 1 / 3 && randomNumber < 2 / 3) {
        computermove = 'paper';
      }
      else if (randomNumber >= 2 / 3 && randomNumber < 1) {
        computermove = 'scissors';
      }
      return computermove;
    }
  </script>
</body>

</html>
